version: "3.9"

volumes:
  pgdata:

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-training}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-training_secret}
      POSTGRES_DB: ${POSTGRES_DB:-training_app}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U training -d training_app"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-training}:${POSTGRES_PASSWORD:-training_secret}@postgres:5432/${POSTGRES_DB:-training_app}
    depends_on:
      postgres:
        condition: service_healthy
